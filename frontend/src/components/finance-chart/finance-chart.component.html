<section class="charts-grid" aria-label="Financial history charts">
  <p-card styleClass="chart-card">
    <div class="chart-heading">
      <h2>Monthly savings</h2>
      <p-button
        label="Reset zoom"
        icon="pi pi-refresh"
        severity="secondary"
        size="small"
        [outlined]="true"
        (onClick)="resetZoom('monthly')"
      />
    </div>
    <div class="chart-wrap" [class.loading]="loading">
      @if (!loading && timeline.points.length === 0) {
        <div class="chart-empty">Add salary settings or an entry to begin your timeline.</div>
      }
      <canvas #monthlyChart></canvas>
    </div>
  </p-card>

  <p-card styleClass="chart-card">
    <div class="chart-heading">
      <h2>Cumulative balance</h2>
      <p-button
        label="Reset zoom"
        icon="pi pi-refresh"
        severity="secondary"
        size="small"
        [outlined]="true"
        (onClick)="resetZoom('cumulative')"
      />
    </div>
    <div class="chart-wrap" [class.loading]="loading">
      @if (!loading && timeline.points.length === 0) {
        <div class="chart-empty">Add salary settings or an entry to begin your timeline.</div>
      }
      <canvas #cumulativeChart></canvas>
    </div>
  </p-card>
</section>
